name: CI

on:
  push:
    branches: [main]
    paths-ignore: [docs/**, "*.md"]
  pull_request:
    branches: [main]
    paths-ignore: [docs/**, "*.md"]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: 0
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      - name: Run tests
        run: go test -race ./...
